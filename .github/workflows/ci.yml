name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-validate:
    name: Lint & Validate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Validate package.json
        run: node -e "JSON.parse(require('fs').readFileSync('package.json','utf8')); console.log('package.json is valid')"

      - name: Check CLI entry point parses
        run: node -c bin/pathfix.js

      - name: Verify help output
        run: node bin/pathfix.js --help

      - name: Validate PowerShell scripts syntax
        shell: pwsh
        run: |
          $errors = @()
          Get-ChildItem scripts/*.ps1 | ForEach-Object {
            $tokens = $null
            $parseErrors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$parseErrors) | Out-Null
            if ($parseErrors.Count -gt 0) {
              $errors += "$($_.Name): $($parseErrors.Count) parse error(s)"
              $parseErrors | ForEach-Object { Write-Host "  $_" }
            } else {
              Write-Host "OK: $($_.Name)"
            }
          }
          if ($errors.Count -gt 0) {
            Write-Error "PowerShell parse errors found:`n$($errors -join "`n")"
            exit 1
          }

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
          $results = Get-ChildItem scripts/*.ps1 | ForEach-Object {
            Invoke-ScriptAnalyzer -Path $_.FullName -Severity Error,Warning
          }
          if ($results) {
            $results | Format-Table -AutoSize
            Write-Error "$($results.Count) issue(s) found by PSScriptAnalyzer"
            exit 1
          } else {
            Write-Host "PSScriptAnalyzer: no issues found"
          }

      - name: Verify diagnose runs (dry smoke test)
        shell: pwsh
        run: |
          # Run diagnose and confirm it exits cleanly (exit 0)
          & pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/Diagnose-Path.ps1
          if ($LASTEXITCODE -and $LASTEXITCODE -ne 0) {
            Write-Error "Diagnose-Path.ps1 exited with code $LASTEXITCODE"
            exit 1
          }
